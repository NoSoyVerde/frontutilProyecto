<div class="container my-5 remove-post">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10">
      @if (loading) {
      <div class="d-flex justify-content-center my-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Cargando...</span>
        </div>
      </div>
      } @if (error) {
      <div class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
      </div>
      } @if (!loading && !error && oIdea) {

      <app-fernandez-unrouted-admin-view [oIdea]="oIdea"> </app-fernandez-unrouted-admin-view>

      <div class="confirm-box p-4 border-start border-5 border-danger bg-danger bg-opacity-10 rounded my-4">
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-exclamation-triangle-fill text-danger fs-4 me-3"></i>
          <h2 class="h5 mb-0">Confirmar Borrado Permanente</h2>
        </div>
        <div class="bg-white p-3 rounded mb-3 border-start border-3 border-danger">
          <p class="mb-0 fw-semibold text-danger small">
            Idea a borrar: <span class="font-monospace">"{{ oIdea.titulo }}"</span> (ID: {{ oIdea.id }})
          </p>
        </div>
        <div class="alert alert-danger mb-3">
          <p class="mb-0">
            <strong>⚠️ Advertencia:</strong> Esta acción no se puede deshacer. La idea y todos sus datos serán eliminados permanentemente.
          </p>
        </div>
        <div class="d-flex justify-content-between gap-2">
          <button class="btn btn-outline-secondary" (click)="cancel()" [disabled]="deleting" title="Volver a la lista sin borrar">
            <i class="bi bi-arrow-left me-2"></i>Cancelar
          </button>
          <button class="btn btn-danger" [disabled]="deleting" (click)="confirmDelete()" title="Eliminar permanentemente esta idea">
            @if (deleting) {
            <span
              class="spinner-border spinner-border-sm me-2"
              role="status"
              aria-hidden="true"
            ></span>
            Borrando...
            } @else {
            <i class="bi bi-trash me-2"></i>Borrar Definitivamente
            }
          </button>
        </div>
      </div>
      }
    </div>
  </div>
</div>
